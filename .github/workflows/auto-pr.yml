name: Auto PR (Claude branches)

on:
  push:
    branches: ["claude/**"]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".vscode/**"

concurrency:
  group: auto-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  create-pr:
    name: Create Pull Request
    runs-on: ubuntu-latest
    needs: [ci]
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Create PR if none exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.ref_name }}
        run: |

          # Check if a PR already exists for this branch
          EXISTING=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number // empty' 2>/dev/null || echo "")

          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists for $BRANCH — skipping creation."
            exit 0
          fi

          # Build PR title from latest commit
          TITLE=$(git log -1 --pretty='%s')

          # Build PR body from commit log
          COMMITS=$(git log origin/main..HEAD --pretty='- %s' --reverse)
          BODY=$(cat <<EOF
## Changes

${COMMITS}

---
*Auto-created from Claude Code session.*
EOF
          )

          gh pr create \
            --title "$TITLE" \
            --body "$BODY" \
            --base main \
            --head "$BRANCH"
