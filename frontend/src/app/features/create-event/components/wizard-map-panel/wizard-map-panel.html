<ng-container *transloco="let t; read: 'create-event'">
	<div
		class="relative h-full w-full overflow-hidden rounded-l-2xl bg-slate-100"
	>
		<app-simple-map-preview
			class="h-full w-full"
			[latitude]="latitude()"
			[longitude]="longitude()"
			[locationName]="locationName()"
		/>

		@if (!hasLocation()) {
		<div
			class="absolute inset-0 flex flex-col justify-end bg-linear-to-t from-black/80 via-black/40 to-transparent p-8"
		>
			<h2 class="text-2xl font-semibold text-white">
				{{ t('mapPanel.heading') }}
			</h2>
			<p class="mt-2 text-base text-white/70">{{ t('mapPanel.subtitle') }}</p>
		</div>
		}
	</div>
</ng-container>
