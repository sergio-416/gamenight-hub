<ng-container *transloco="let t; read: 'create-event'">
	<div class="space-y-6">
		<div>
			<h2 class="text-xl font-semibold text-on-surface">
				{{ t('stepPlayers.title') }}
			</h2>
			<p class="mt-1 text-sm text-on-surface-muted">
				{{ t('stepPlayers.subtitle') }}
			</p>
		</div>

		<div class="flex items-end gap-2">
			<app-player-stepper
				class="flex-1"
				[value]="maxPlayers()"
				(valueChange)="maxPlayersChange.emit($event)"
			/>
			<app-info-tooltip [text]="t('stepPlayers.tooltipHost')" />
		</div>

		@if (playerRangeHint()) {
		<p class="flex items-center gap-1.5 text-sm text-on-surface-muted">
			<svg
				xmlns="http://www.w3.org/2000/svg"
				class="h-4 w-4 shrink-0"
				viewBox="0 0 20 20"
				fill="currentColor"
				aria-hidden="true"
			>
				<path
					d="M9 6a3 3 0 11-6 0 3 3 0 016 0zM17 6a3 3 0 11-6 0 3 3 0 016 0zM12.93 17c.046-.327.07-.66.07-1a6.97 6.97 0 00-1.5-4.33A5 5 0 0119 16v1h-6.07zM6 11a5 5 0 015 5v1H1v-1a5 5 0 015-5z"
				/>
			</svg>
			{{ t('stepPlayers.gameSupports', { range: playerRangeHint() }) }}
		</p>
		} @if (playerRangeWarning()) {
		<div
			class="flex items-start gap-2 rounded-lg border border-amber-200 bg-amber-50 px-4 py-3 text-sm text-amber-700"
		>
			<svg
				xmlns="http://www.w3.org/2000/svg"
				class="mt-0.5 h-4 w-4 shrink-0"
				viewBox="0 0 20 20"
				fill="currentColor"
				aria-hidden="true"
			>
				<path
					fill-rule="evenodd"
					d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z"
					clip-rule="evenodd"
				/>
			</svg>
			{{ playerRangeWarning() }}
		</div>
		}

		<div class="rounded-xl border border-border bg-slate-50 p-4">
			<p class="text-xs text-on-surface-muted">
				{{ t('stepPlayers.communityGuidelines') }}
			</p>
		</div>
	</div>
</ng-container>
