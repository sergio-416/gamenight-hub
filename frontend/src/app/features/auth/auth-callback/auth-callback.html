<ng-container *transloco="let t; read: 'auth'">
	<section
		class="flex min-h-screen items-center justify-center bg-slate-50 px-4 py-12 sm:px-6 lg:px-8"
	>
		<div
			class="w-full max-w-md overflow-hidden rounded bg-surface-raised text-on-surface-muted shadow-md shadow-border"
		>
			<div class="p-6">
				<header class="mb-6 text-center">
					<h1 class="text-3xl font-medium tracking-tight text-on-surface">
						<span class="text-on-surface-muted">GameNight</span
						><span class="text-emerald-500">Hub</span>
					</h1>
				</header>

				@switch (state()) { @case ("loading") {
				<div
					class="flex flex-col items-center justify-center py-8"
					role="status"
				>
					<svg
						class="h-12 w-12 animate-spin text-emerald-500"
						xmlns="http://www.w3.org/2000/svg"
						fill="none"
						viewBox="0 0 24 24"
					 aria-hidden="true">
						<circle
							class="opacity-25"
							cx="12"
							cy="12"
							r="10"
							stroke="currentColor"
							stroke-width="4"
						></circle>
						<path
							class="opacity-75"
							fill="currentColor"
							d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
						></path>
					</svg>
					<p class="mt-4 text-on-surface-medium">{{ t('callback.signingIn') }}</p>
				</div>
				} @case ("prompt") {
				<div class="flex flex-col items-center py-4">
					<p class="mb-4 text-sm text-on-surface-medium">
						{{ t('callback.prompt.instruction') }}
					</p>
					<div class="relative w-full">
						<input
							id="promptEmail"
							type="email"
							[placeholder]="t('callback.prompt.emailPlaceholder')"
							[value]="promptEmail()"
							(input)="onPromptEmailChange($event)"
							class="peer relative h-10 w-full rounded border border-border px-4 text-sm text-on-surface-muted placeholder-transparent outline-none transition-all focus:border-emerald-500"
						/>
						<label
							for="promptEmail"
							class="absolute -top-2 left-2 z-1 bg-surface-raised px-2 text-xs text-on-surface-dim transition-all peer-focus:-top-2 peer-focus:text-xs peer-focus:text-emerald-500"
						>
							{{ t('callback.prompt.emailLabel') }}
						</label>
					</div>
					<button
						type="button"
						(click)="confirmEmail()"
						class="mt-4 inline-flex h-10 w-full items-center justify-center rounded bg-emerald-500 px-5 text-sm font-medium text-white transition duration-300 hover:bg-emerald-600"
					>
						{{ t('callback.prompt.continue') }}
					</button>
				</div>
				} @case ("error") {
				<div class="flex flex-col items-center justify-center py-8">
					<div
						class="flex h-16 w-16 items-center justify-center rounded-full bg-red-100"
					>
						<svg
							class="h-8 w-8 text-red-600"
							xmlns="http://www.w3.org/2000/svg"
							fill="none"
							viewBox="0 0 24 24"
							stroke="currentColor"
							stroke-width="2"
						 aria-hidden="true">
							<path
								stroke-linecap="round"
								stroke-linejoin="round"
								d="M6 18L18 6M6 6l12 12"
							/>
						</svg>
					</div>
					<h2 class="mt-4 text-xl font-semibold text-on-surface">
						{{ t('callback.error.title') }}
					</h2>
					<p class="mt-2 text-center text-red-600">{{ errorMessage() }}</p>
					<a
						routerLink="/login"
						[attr.aria-label]="t('callback.error.backToLoginAria')"
						class="mt-6 inline-flex h-10 items-center justify-center rounded bg-emerald-500 px-5 text-sm font-medium text-white transition duration-300 hover:bg-emerald-600"
					>
						{{ t('callback.error.backToLogin') }}
					</a>
				</div>
				} }
			</div>
		</div>
	</section>
</ng-container>
