<ng-container *transloco="let t; read: 'auth'">
	<section
		class="flex min-h-screen items-center justify-center bg-slate-50 px-4 py-12 sm:px-6 lg:px-8"
	>
		<div
			class="w-full max-w-md overflow-hidden rounded bg-surface-raised text-on-surface-muted shadow-md shadow-border"
		>
			<div class="p-6">
				<header class="mb-6 text-center">
					<h1 class="text-3xl font-medium tracking-tight text-on-surface">
						<span class="text-on-surface-muted">GameNight</span
						><span class="text-emerald-500">Hub</span>
					</h1>
					<p class="mt-2 text-sm text-on-surface-medium">{{ t('login.subtitle') }}</p>
				</header>

				<button
					type="button"
					[attr.aria-label]="isGoogleLoading() ? t('login.googleSigningInAria') : t('login.googleSignInAria')"
					class="group relative mb-6 flex w-full items-center justify-center gap-3 rounded-lg border border-border-strong bg-surface-raised px-4 py-3 text-sm font-medium text-on-surface-strong shadow-sm transition-all duration-200 hover:bg-slate-50 hover:shadow-md focus:ring-2 focus:ring-emerald-500 focus:ring-offset-2 focus:outline-none disabled:cursor-not-allowed disabled:opacity-50 sm:py-4 sm:text-base"
					(click)="loginWithGoogle()"
					[disabled]="isGoogleLoading()"
				>
					@if (isGoogleLoading()) {
					<svg
						class="h-5 w-5 animate-spin text-on-surface-dim"
						xmlns="http://www.w3.org/2000/svg"
						fill="none"
						viewBox="0 0 24 24"
					 aria-hidden="true">
						<circle
							class="opacity-25"
							cx="12"
							cy="12"
							r="10"
							stroke="currentColor"
							stroke-width="4"
						></circle>
						<path
							class="opacity-75"
							fill="currentColor"
							d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
						></path>
					</svg>
					<span>{{ t('login.googleSigningIn') }}</span>
					} @else {
					<svg
						class="h-5 w-5"
						viewBox="0 0 24 24"
						xmlns="http://www.w3.org/2000/svg"
					 aria-hidden="true">
						<path
							fill="hsl(217.4, 89%, 60.8%)"
							d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
						/>
						<path
							fill="hsl(142.1, 76.3%, 39.2%)"
							d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
						/>
						<path
							fill="hsl(47.7, 93.8%, 53.3%)"
							d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
						/>
						<path
							fill="hsl(0, 84.2%, 60.2%)"
							d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
						/>
					</svg>
					<span>{{ t('login.googleSignIn') }}</span>
					}
				</button>

				<div class="relative mb-6">
					<div class="absolute inset-0 flex items-center">
						<div class="w-full border-t border-border"></div>
					</div>
					<div class="relative flex justify-center text-xs uppercase">
						<span class="bg-surface-raised px-2 text-on-surface-dim"
							>{{ t('login.divider') }}</span
						>
					</div>
				</div>

				@if (error()) {
				<div
					class="mb-4 rounded bg-red-50 p-3 text-sm text-red-600"
					role="alert"
				>
					{{ error() }}
				</div>
				}

				<form (submit)="$event.preventDefault(); sendLink()">
					<div class="relative">
						<input
							id="email"
							type="email"
							name="email"
							autocomplete="email"
							[placeholder]="t('login.emailPlaceholder')"
							[value]="email()"
							(input)="onEmailChange($event)"
							class="peer relative h-10 w-full rounded border border-border px-4 text-sm text-on-surface-muted placeholder-transparent transition-all outline-none focus:border-emerald-500 focus:outline-none"
						/>
						<label
							for="email"
							class="absolute -top-2 left-2 z-1 bg-surface-raised px-2 text-xs text-on-surface-dim transition-all peer-focus:-top-2 peer-focus:text-xs peer-focus:text-emerald-500"
						>
							{{ t('login.emailLabel') }}
						</label>
					</div>

					<button
						type="submit"
						[attr.aria-label]="t('login.continueWithEmail')"
						class="mt-4 inline-flex h-10 w-full items-center justify-center gap-2 rounded bg-emerald-500 px-5 text-sm font-medium tracking-wide text-white transition duration-300 hover:bg-emerald-600 focus:bg-emerald-700 disabled:cursor-not-allowed disabled:opacity-50"
						[disabled]="isEmailLoading()"
					>
						{{ t('login.continueWithEmail') }}
					</button>
				</form>

				<p class="mt-6 text-center text-xs text-on-surface-dim">
					{{ t('login.organiserPrompt') }}
					<a
						routerLink="/register/organiser"
						[attr.aria-label]="t('login.organiserLinkAria')"
						class="font-medium text-on-surface-muted hover:text-emerald-500"
					>
						{{ t('login.organiserLink') }}
					</a>
				</p>
			</div>
		</div>
	</section>
</ng-container>
