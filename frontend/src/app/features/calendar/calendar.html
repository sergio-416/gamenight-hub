<ng-container *transloco="let t; read: 'calendar'">
	<section
		class="mx-auto max-w-6xl space-y-6 rounded-xl bg-surface-raised p-6 shadow-sm"
	>
		@if (loading()) {
		<div class="flex items-center justify-center py-16" aria-live="polite">
			<div
				class="h-8 w-8 animate-spin rounded-full border-4 border-border border-t-emerald-500"
			></div>
			<span class="ml-3 text-sm text-on-surface-dim">{{ t('loading') }}</span>
		</div>
		} @else if (error()) {
		<div
			class="rounded-lg border border-red-500/30 bg-red-500/10 px-6 py-8 text-center"
			role="alert"
		>
			<p class="text-sm text-red-400">{{ t('error') }}</p>
		</div>
		} @else {
		<app-calendar-header
			[monthYear]="monthYear()"
			[eventCount]="eventCount()"
			(prev)="onPrevMonth()"
			(next)="onNextMonth()"
			(today)="onToday()"
			(newEvent)="onNewEvent()"
		/>

		<app-calendar-grid
			[days]="days()"
			[eventsByDate]="eventsByDate()"
			[selectedDate]="selectedDay()"
			(dayClick)="onDayClick($event)"
			(eventClick)="onEventClick($event)"
		/>

		<app-event-details-strip
			[events]="detailEvents()"
			[selectedDay]="selectedDay()"
			(eventClick)="onDetailCardClick($event)"
		/>
		}
	</section>
</ng-container>
