<ng-container *transloco="let t; read: 'calendar'">
	<section class="mt-6">
		<div class="mb-3 flex items-center gap-2">
			<svg
				xmlns="http://www.w3.org/2000/svg"
				viewBox="0 0 24 24"
				fill="currentColor"
				class="h-5 w-5 text-emerald-500"
				aria-hidden="true"
			>
				<path
					fill-rule="evenodd"
					d="M6.75 2.25A.75.75 0 0 1 7.5 3v1.5h9V3A.75.75 0 0 1 18 3v1.5h.75a3 3 0 0 1 3 3v11.25a3 3 0 0 1-3 3H5.25a3 3 0 0 1-3-3V7.5a3 3 0 0 1 3-3H6V3a.75.75 0 0 1 .75-.75Zm13.5 9a1.5 1.5 0 0 0-1.5-1.5H5.25a1.5 1.5 0 0 0-1.5 1.5v7.5a1.5 1.5 0 0 0 1.5 1.5h13.5a1.5 1.5 0 0 0 1.5-1.5v-7.5Z"
					clip-rule="evenodd"
				/>
			</svg>
			<h3 class="text-lg font-semibold text-on-surface-strong">
				{{ t('details.heading') }}
			</h3>
			<span class="text-sm text-on-surface-muted">{{ sectionLabel() }}</span>
		</div>

		@if (hasEvents()) {
		<div class="flex snap-x snap-mandatory gap-4 overflow-x-auto pb-2">
			@for (event of events(); track event.id) {
			<app-event-detail-card
				class="snap-start"
				[event]="event"
				[isToday]="isEventToday(event)"
				(cardClick)="onEventClick($event)"
			/>
			}
		</div>
		} @else {
		<div class="rounded-lg bg-slate-50 py-8 text-center">
			<p class="text-sm text-on-surface-dim">
				@if (selectedDay()) { {{ t('details.noEventsDay') }} } @else { {{
				t('details.noEventsMonth') }} }
			</p>
		</div>
		}
	</section>
</ng-container>
