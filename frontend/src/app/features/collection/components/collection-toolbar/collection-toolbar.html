<div class="flex flex-wrap items-center gap-3">
	<div class="w-full sm:flex-1 sm:w-auto">
		<app-search-input
			[value]="searchQuery()"
			placeholder="Search collection..."
			ariaLabel="Search games in collection"
			(valueChange)="searchChange.emit($event)"
		/>
	</div>
	<div class="flex flex-wrap items-center gap-2">
		<app-player-count-filter-pill
			[activeCount]="playerFilter()"
			(countChange)="playerFilterChange.emit($event)"
		/>
		<app-category-filter-pill
			[activeCategory]="categoryFilter()"
			[categories]="availableCategories()"
			(categoryChange)="categoryFilterChange.emit($event)"
		/>
		<app-sort-pill
			[activeSort]="sortMode()"
			(sortChange)="sortChange.emit($event)"
		/>
	</div>
	<div class="flex items-center gap-1">
		<button
			type="button"
			class="cursor-pointer rounded-lg p-2 transition-colors"
			[class]="
				viewMode() === gridMode
					? 'bg-emerald-500/15 text-emerald-600'
					: 'text-on-surface-dim hover:text-on-surface-strong'
			"
			aria-label="Grid view"
			(click)="viewModeChange.emit(gridMode)"
		>
			<svg
				xmlns="http://www.w3.org/2000/svg"
				class="h-5 w-5"
				viewBox="0 0 24 24"
				fill="none"
				stroke="currentColor"
				stroke-width="2"
				aria-hidden="true"
			>
				<path
					stroke-linecap="round"
					stroke-linejoin="round"
					d="M4 5a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H5a1 1 0 01-1-1V5zm10 0a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1V5zM4 15a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H5a1 1 0 01-1-1v-4zm10 0a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z"
				/>
			</svg>
		</button>
		<button
			type="button"
			class="cursor-pointer rounded-lg p-2 transition-colors"
			[class]="
				viewMode() === listMode
					? 'bg-emerald-500/15 text-emerald-600'
					: 'text-on-surface-dim hover:text-on-surface-strong'
			"
			aria-label="List view"
			(click)="viewModeChange.emit(listMode)"
		>
			<svg
				xmlns="http://www.w3.org/2000/svg"
				class="h-5 w-5"
				viewBox="0 0 24 24"
				fill="none"
				stroke="currentColor"
				stroke-width="2"
				aria-hidden="true"
			>
				<path
					stroke-linecap="round"
					stroke-linejoin="round"
					d="M4 6h16M4 12h16M4 18h16"
				/>
			</svg>
		</button>
	</div>
</div>
