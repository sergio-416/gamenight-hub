<ng-container *transloco="let t; read: 'collection'">
	<h2 class="mb-5 text-xl font-bold text-on-surface">
		{{ t('recommendations.title') }}
	</h2>
	<div class="grid grid-cols-2 gap-4 md:grid-cols-5">
		@for (game of recommendations(); track game.id) {
		<button
			type="button"
			class="cursor-pointer overflow-hidden rounded-xl border border-border bg-surface-raised shadow-sm transition-all hover:-translate-y-1 hover:shadow-lg"
			(click)="gameClick.emit(game.id)"
		>
			<div class="relative aspect-3/4 w-full overflow-hidden bg-slate-100">
				@if (game.imageUrl ?? game.thumbnailUrl; as imgSrc) {
				<img
					[ngSrc]="imgSrc"
					[alt]="game.name"
					fill
					sizes="(min-width: 768px) 18vw, 45vw"
					class="object-cover"
				/>
				} @else {
				<div
					class="flex h-full items-center justify-center text-sm text-on-surface-dim"
				>
					{{ game.name }}
				</div>
				}
			</div>
			<div class="p-3">
				<h4 class="truncate text-sm font-semibold text-on-surface-strong">
					{{ game.name }}
				</h4>
				<span class="text-xs text-on-surface-dim">
					{{ game.categories?.[0] ?? "" }}
				</span>
			</div>
		</button>
		} @if (showCta()) {
		<button
			type="button"
			class="flex min-h-[280px] cursor-pointer flex-col items-center justify-center gap-3 rounded-xl border-2 border-dashed border-emerald-500/30 bg-emerald-500/5 p-6 transition-all hover:border-emerald-500 hover:bg-emerald-500/10"
			(click)="addClick.emit()"
		>
			<div
				class="flex h-14 w-14 items-center justify-center rounded-full bg-emerald-500/15"
			>
				<svg
					xmlns="http://www.w3.org/2000/svg"
					class="h-7 w-7 text-emerald-500"
					fill="none"
					viewBox="0 0 24 24"
					stroke="currentColor"
					stroke-width="2"
				 aria-hidden="true">
					<path
						stroke-linecap="round"
						stroke-linejoin="round"
						d="M12 4v16m8-8H4"
					/>
				</svg>
			</div>
			<h4 class="text-sm font-bold text-emerald-500">
				{{ t('recommendations.addToLibrary') }}
			</h4>
			<p class="text-xs text-on-surface-muted">
				{{ t('recommendations.expandCollection') }}
			</p>
		</button>
		}
	</div>
</ng-container>
