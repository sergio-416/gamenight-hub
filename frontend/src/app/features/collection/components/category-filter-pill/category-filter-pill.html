<div class="relative">
	<button
		type="button"
		(click)="open.set(!open())"
		[attr.aria-expanded]="open()"
		aria-haspopup="listbox"
		class="inline-flex items-center gap-2 h-9 px-4 rounded-full text-sm font-medium border border-border bg-surface-raised text-on-surface-strong hover:bg-slate-50 transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-emerald-500 focus-visible:ring-offset-2"
	>
		<span>{{ activeLabel() }}</span>
		<svg
			xmlns="http://www.w3.org/2000/svg"
			class="h-4 w-4 opacity-50"
			viewBox="0 0 20 20"
			fill="currentColor"
			aria-hidden="true"
		>
			<path
				fill-rule="evenodd"
				d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z"
				clip-rule="evenodd"
			/>
		</svg>
	</button>

	@if (open()) {
	<ul
		role="listbox"
		class="absolute top-full left-0 mt-1.5 z-50 bg-surface-raised rounded-xl shadow-lg border border-border py-1 min-w-[160px] max-h-64 overflow-y-auto"
	>
		@for (opt of options(); track opt.key) {
		<li
			role="option"
			[attr.aria-selected]="activeCategory() === opt.key"
			(click)="select(opt.key)"
			[class]="
				activeCategory() === opt.key
					? 'bg-emerald-50 text-emerald-700 font-semibold'
					: 'text-on-surface-medium hover:bg-slate-50'
			"
			class="w-full text-left px-4 py-2 text-sm transition-colors cursor-pointer"
		>
			{{ opt.label }}
		</li>
		}
	</ul>
	}
</div>
