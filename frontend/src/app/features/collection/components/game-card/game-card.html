<div
	role="button"
	tabindex="0"
	class="cursor-pointer overflow-hidden rounded-xl border border-border bg-surface-raised shadow-sm transition-all hover:-translate-y-1 hover:shadow-lg"
	[attr.aria-label]="'View ' + game().name + ' details'"
	(click)="gameClick.emit(game().id)"
	(keydown.enter)="gameClick.emit(game().id)"
>
	<div class="relative aspect-square overflow-hidden">
		@if (game().imageUrl) {
		<img
			[ngSrc]="game().imageUrl!"
			[alt]="game().name"
			fill
			[priority]="priorityImage()"
			class="object-cover"
		/>
		} @else if (game().thumbnailUrl) {
		<img
			[ngSrc]="game().thumbnailUrl!"
			[alt]="game().name"
			fill
			[priority]="priorityImage()"
			class="object-cover"
		/>
		} @else {
		<div
			class="flex h-full w-full items-center justify-center bg-linear-to-br from-emerald-400 to-slate-700"
		>
			<span class="text-4xl font-bold text-white/20">
				{{ game().name.charAt(0).toUpperCase() }}
			</span>
		</div>
		}
	</div>

	<div class="space-y-2.5 p-4">
		<h3 class="truncate text-sm font-semibold text-on-surface">
			{{ game().name }}
		</h3>

		<div class="flex items-center gap-3 text-xs text-on-surface-muted">
			@if (playerRange()) {
			<span class="inline-flex items-center gap-1">
				<svg
					xmlns="http://www.w3.org/2000/svg"
					viewBox="0 0 24 24"
					fill="none"
					stroke="currentColor"
					stroke-width="1.5"
					class="h-3.5 w-3.5 shrink-0"
					aria-hidden="true"
				>
					<path
						stroke-linecap="round"
						stroke-linejoin="round"
						d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"
					/>
				</svg>
				{{ playerRange() }}
			</span>
			} @if (complexityLabel()) {
			<span class="inline-flex items-center gap-1">
				<svg
					xmlns="http://www.w3.org/2000/svg"
					viewBox="0 0 24 24"
					fill="none"
					stroke="currentColor"
					stroke-width="1.5"
					class="h-3.5 w-3.5 shrink-0"
					aria-hidden="true"
				>
					<path
						stroke-linecap="round"
						stroke-linejoin="round"
						d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"
					/>
					<path
						stroke-linecap="round"
						stroke-linejoin="round"
						d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
					/>
				</svg>
				{{ complexityLabel() }}
			</span>
			}
		</div>

		@if (badgeLabel()) {
		<span
			class="inline-block rounded-full px-2.5 py-0.5 text-xs font-semibold tracking-wide"
			[class]="badgeColor()"
			[class.uppercase]="game().status !== 'owned' || !primaryCategory()"
		>
			{{ badgeLabel() }}
		</span>
		}
	</div>
</div>
