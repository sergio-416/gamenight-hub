<ng-container *transloco="let t; read: 'feature-tour'">
	<div class="relative flex min-h-screen flex-col">
		<div class="relative flex flex-1 items-start">
			<a
				[routerLink]="['/features', prevRoute()]"
				class="sticky top-1/2 inline-flex items-center justify-center w-10 h-10 rounded-full border border-border bg-surface-raised text-on-surface-muted shadow-sm hover:bg-emerald-50 hover:border-emerald-300 hover:text-emerald-600 transition-colors self-center ml-4 shrink-0 -translate-y-1/2"
				[attr.aria-label]="t('layout.prevAria')"
			>
				<fa-icon [icon]="faChevronLeft" aria-hidden="true" />
			</a>

			<div class="flex-1">
				<ng-content />
			</div>

			<a
				[routerLink]="['/features', nextRoute()]"
				class="sticky top-1/2 inline-flex items-center justify-center w-10 h-10 rounded-full border border-border bg-surface-raised text-on-surface-muted shadow-sm hover:bg-emerald-50 hover:border-emerald-300 hover:text-emerald-600 transition-colors self-center mr-4 shrink-0 -translate-y-1/2"
				[attr.aria-label]="t('layout.nextAria')"
			>
				<fa-icon [icon]="faChevronRight" aria-hidden="true" />
			</a>
		</div>

		<div class="py-8 text-center">
			<a
				routerLink="/home"
				class="text-sm text-on-surface-dim hover:text-slate-200 transition"
			>
				{{ t('layout.backToHome') }}
			</a>
		</div>
	</div>
</ng-container>
