@if (isOpen()) {
<div
	data-testid="image-lightbox-backdrop"
	class="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm"
	role="dialog"
	aria-modal="true"
	[attr.aria-label]="alt() || 'Full size image'"
	cdkTrapFocus
	cdkTrapFocusAutoCapture
	(click)="handleBackdropClick($event)"
>
	<button
		data-testid="image-lightbox-close"
		type="button"
		class="absolute top-4 right-4 rounded-full bg-white/10 p-2 text-white transition-colors hover:bg-white/25 focus:outline-none focus:ring-2 focus:ring-white/50"
		aria-label="Close image preview"
		(click)="close()"
	>
		<svg
			xmlns="http://www.w3.org/2000/svg"
			class="h-6 w-6"
			fill="none"
			aria-hidden="true"
			viewBox="0 0 24 24"
			stroke="currentColor"
			stroke-width="2"
		>
			<path
				stroke-linecap="round"
				stroke-linejoin="round"
				d="M6 18L18 6M6 6l12 12"
			/>
		</svg>
	</button>

	<img
		data-testid="image-lightbox-image"
		[ngSrc]="src()"
		[alt]="alt()"
		width="1200"
		height="800"
		sizes="90vw"
		class="max-h-[90vh] max-w-[90vw] rounded-lg object-contain shadow-2xl"
		(click)="$event.stopPropagation()"
	/>
</div>
}
