<ng-container *transloco="let t">
	@if (profile(); as p) {
	<a
		routerLink="/profile/me"
		fragment="xp"
		class="group flex items-center gap-1.5 rounded-full bg-slate-100 px-3 py-1 transition-colors duration-200 hover:bg-slate-200"
		[title]="tooltipText()"
		[attr.aria-label]="t('xp.badge.ariaLabel')"
	>
		<fa-icon
			[icon]="iconShield"
			class="text-sm text-indigo-500 transition-colors group-hover:text-indigo-600"
		/>
		<span class="text-xs font-semibold text-on-surface-strong"
			>{{ t('xp.badge.levelShort', { level: level() }) }}</span
		>
		<div class="relative h-1 w-12 overflow-hidden rounded-full bg-slate-300">
			<div
				class="absolute inset-y-0 left-0 rounded-full bg-linear-to-r from-indigo-500 to-purple-500 transition-all duration-500"
				[style.width.%]="progressPercent()"
			></div>
		</div>
	</a>
	}
</ng-container>
