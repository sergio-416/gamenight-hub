<footer
	*transloco="let t"
	class="border-t border-border bg-surface-overlay px-6 py-8 shadow-[0_-1px_8px_0_rgba(100,116,139,0.05)]"
>
	<div
		class="mx-auto flex max-w-6xl flex-col items-center gap-6 md:flex-row md:justify-between"
	>
		<div class="flex items-center gap-3">
			<a routerLink="/home" class="flex items-center">
				<img
					ngSrc="/GNH-isotype.png"
					[alt]="t('footer.brandName')"
					width="32"
					height="28"
				/>
			</a>
			<span class="text-xs text-on-surface-dim">{{ t('footer.brandName') }}</span>
		</div>

		<nav class="flex gap-6" aria-label="Footer navigation">
			<a
				routerLink="/terms"
				class="text-xs font-medium uppercase tracking-wider text-on-surface-dim transition hover:text-emerald-500"
				>{{ t('footer.nav.terms') }}</a
			>
			<a
				routerLink="/privacy"
				class="text-xs font-medium uppercase tracking-wider text-on-surface-dim transition hover:text-emerald-500"
				>{{ t('footer.nav.privacy') }}</a
			>
			<a
				routerLink="/support"
				class="text-xs font-medium uppercase tracking-wider text-on-surface-dim transition hover:text-emerald-500"
				>{{ t('footer.nav.support') }}</a
			>
		</nav>

		<div class="flex items-center gap-2">
			<a
				href="https://boardgamegeek.com"
				target="_blank"
				rel="noopener noreferrer"
				class="flex items-center opacity-60 transition hover:opacity-100"
			>
				<img
					ngSrc="/BGG_SM.png"
					[alt]="t('footer.bggAlt')"
					width="120"
					height="35"
				/>
			</a>
		</div>
	</div>
</footer>
