# Production Docker Compose — used on gamenight-hub.com (72.61.201.76)
# Requires: .env.production with all secrets set (never commit this file)
# Usage: docker compose -f docker-compose.prod.yml up -d

services:
  postgres:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/gamenight-hub/backend:latest}
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3000
      POSTGRES_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM}
      FRONTEND_URL: https://gamenight-hub.com
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/v1/health').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./frontend/dist/gamenight-hub/browser:/var/www/gamenight-hub/dist/gamenight-hub/browser:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot
      - nginx_logs:/var/log/nginx
    depends_on:
      backend:
        condition: service_healthy

  backend-migrate:
    image: ${BACKEND_IMAGE:-ghcr.io/gamenight-hub/backend:latest}
    profiles: ["migrate"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    entrypoint: ["node", "--input-type=module"]
    command:
      - -e
      - |
        import { drizzle } from 'drizzle-orm/postgres-js';
        import { migrate } from 'drizzle-orm/postgres-js/migrator';
        import postgres from 'postgres';
        const url = `postgresql://${process.env.POSTGRES_USER}:${process.env.POSTGRES_PASSWORD}@postgres:5432/${process.env.POSTGRES_DB}`;
        const client = postgres(url, { max: 1 });
        const db = drizzle({ client });
        try {
          await migrate(db, { migrationsFolder: './src/database/migrations' });
          console.log('Migrations complete');
        } catch (err) {
          console.error('Migration failed:', err);
          process.exit(1);
        } finally {
          await client.end();
        }
    restart: "no"

volumes:
  postgres_data:
  certbot_webroot:
  nginx_logs:
